name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover tests -v
      - name: Smoke test CLI
        run: |
          python -m bailey --version
          # missing env must fail with exit code 3 (auth) and JSON on stderr
          set +e
          python -m bailey confluence spaces 2>err.json
          code=$?
          set -e
          test "$code" -eq 3
          grep -q '"exit_code": 3' err.json
